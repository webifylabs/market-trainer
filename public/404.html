<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>StockPro Academy</title>
    <script>
      // Single Page App redirect trick for GitHub Pages
      var repo = '/market-trainer'; // change to your repo name if different
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        repo + '/?/' +
        l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
